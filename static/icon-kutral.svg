<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ícono Kütral.
  - Ruca al fondo (techo cónico, silueta marrón oscura).
  - Fuego al centro (llama con gradiente brasa: amarillo → naranja → rojo).
  - Dos figuras humanas alrededor, sentadas en torno al fuego.
  - Una tiene la máscara sonriente del teatro (comedia).
  - La otra tiene la máscara triste del teatro (tragedia).

  Lectura simbólica: en torno al kütral (fuego en mapudungun), las
  historias provocan emociones opuestas — tragedia y comedia.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente del fuego: amarillo brasa al centro, naranja, rojo profundo en bordes -->
    <radialGradient id="fuego" cx="50%" cy="70%" r="55%">
      <stop offset="0%"  stop-color="#fff2a8" />
      <stop offset="35%" stop-color="#ffd66a" />
      <stop offset="65%" stop-color="#ff7a2e" />
      <stop offset="100%" stop-color="#a83020" />
    </radialGradient>
    <!-- Resplandor del fuego (halo) -->
    <radialGradient id="halo" cx="50%" cy="68%" r="50%">
      <stop offset="0%"  stop-color="#ff7a2e" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ff7a2e" stop-opacity="0" />
    </radialGradient>
    <!-- Gradiente para la ruca: marrón cálido oscuro -->
    <linearGradient id="ruca" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#2a1408" />
      <stop offset="100%" stop-color="#4a2818" />
    </linearGradient>
  </defs>

  <!-- Fondo circular sutil (opcional, sirve si se usa como app icon) -->
  <circle cx="256" cy="256" r="252" fill="#1a0e08" />

  <!-- Ruca al fondo: silueta cónica con techo de paja estilizado -->
  <!-- El cono va de los bordes inferiores hacia arriba, dejando hueco para personas y fuego -->
  <path
    d="M 60 440 L 256 90 L 452 440 Z"
    fill="url(#ruca)"
    opacity="0.92"
  />
  <!-- Líneas verticales sutiles del techo (textura de paja/totora) -->
  <g stroke="#1a0a04" stroke-width="2" opacity="0.4" fill="none">
    <line x1="160" y1="430" x2="220" y2="190" />
    <line x1="200" y1="430" x2="234" y2="135" />
    <line x1="256" y1="430" x2="256" y2="95" />
    <line x1="312" y1="430" x2="278" y2="135" />
    <line x1="352" y1="430" x2="292" y2="190" />
  </g>

  <!-- Halo del fuego (resplandor cálido) -->
  <ellipse cx="256" cy="370" rx="130" ry="110" fill="url(#halo)" />

  <!-- Fuego: tres llamas superpuestas, la del centro más alta -->
  <!-- Llama central (más alta) -->
  <path
    d="M 256 410
       C 226 380, 220 340, 245 305
       C 240 330, 252 345, 256 320
       C 262 290, 280 280, 268 250
       C 280 270, 305 310, 295 350
       C 290 385, 280 405, 256 410 Z"
    fill="url(#fuego)"
  />
  <!-- Llama izquierda (más baja) -->
  <path
    d="M 220 420
       C 200 400, 198 370, 215 345
       C 212 360, 220 370, 224 355
       C 228 335, 240 330, 235 315
       C 245 330, 252 365, 244 395
       C 240 410, 232 420, 220 420 Z"
    fill="url(#fuego)"
    opacity="0.85"
  />
  <!-- Llama derecha (intermedia) -->
  <path
    d="M 292 415
       C 270 395, 268 365, 285 340
       C 282 358, 292 368, 296 350
       C 300 325, 312 320, 308 305
       C 320 325, 328 360, 318 395
       C 312 408, 304 418, 292 415 Z"
    fill="url(#fuego)"
    opacity="0.9"
  />

  <!-- Base del fuego (brasas) -->
  <ellipse cx="256" cy="425" rx="60" ry="10" fill="#5a1810" opacity="0.85" />

  <!-- Persona izquierda con máscara de comedia (sonriente) -->
  <g>
    <!-- Cuerpo silueta sentada -->
    <path
      d="M 95 440
         C 95 400, 105 370, 120 350
         L 145 350
         C 158 370, 165 400, 160 440 Z"
      fill="#0a0608"
    />
    <!-- Máscara cara (óvalo color brasa claro como si reflejara el fuego) -->
    <ellipse cx="127" cy="305" rx="28" ry="34" fill="#f8d8a8" />
    <!-- Marco borde de la máscara -->
    <ellipse cx="127" cy="305" rx="28" ry="34" fill="none" stroke="#4a2818" stroke-width="2" />
    <!-- Ojos máscara comedia: dos puntos simples -->
    <circle cx="118" cy="300" r="2.5" fill="#1a0e08" />
    <circle cx="136" cy="300" r="2.5" fill="#1a0e08" />
    <!-- Boca sonriente (comedia) -->
    <path
      d="M 115 318 Q 127 332, 139 318"
      fill="none"
      stroke="#1a0e08"
      stroke-width="2.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Persona derecha con máscara de tragedia (triste) -->
  <g>
    <!-- Cuerpo silueta sentada -->
    <path
      d="M 352 440
         C 347 400, 354 370, 367 350
         L 392 350
         C 407 370, 417 400, 417 440 Z"
      fill="#0a0608"
    />
    <!-- Máscara cara -->
    <ellipse cx="385" cy="305" rx="28" ry="34" fill="#f8d8a8" />
    <ellipse cx="385" cy="305" rx="28" ry="34" fill="none" stroke="#4a2818" stroke-width="2" />
    <!-- Ojos máscara tragedia: dos lágrimas o puntos caídos -->
    <circle cx="376" cy="300" r="2.5" fill="#1a0e08" />
    <circle cx="394" cy="300" r="2.5" fill="#1a0e08" />
    <!-- Boca triste (tragedia) -->
    <path
      d="M 373 326 Q 385 312, 397 326"
      fill="none"
      stroke="#1a0e08"
      stroke-width="2.5"
      stroke-linecap="round"
    />
    <!-- Lágrima -->
    <path
      d="M 373 308 L 371 318 L 376 318 Z"
      fill="#7ab8d6"
      opacity="0.85"
    />
  </g>
</svg>
